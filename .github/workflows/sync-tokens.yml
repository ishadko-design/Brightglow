name: Sync design tokens

# When Figma (Tokens Studio) pushes design/tokens.json to main, regenerate the
# Swift token file and commit it back — so the Xcode side always matches Figma
# without anyone running a command locally.
on:
  push:
    branches: [main]
    paths:
      - design/tokens.json
      - design/build-tokens.mjs

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Regenerate Swift tokens
        run: npm run tokens
      - name: Commit if changed
        run: |
          git config user.name "tokens-bot"
          git config user.email "actions@users.noreply.github.com"
          git add Brightglow/Theme/DesignTokens.generated.swift
          if git diff --staged --quiet; then
            echo "No token changes."
          else
            git commit -m "chore: regenerate design tokens from Figma [skip ci]"
            git push
          fi
